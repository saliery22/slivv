<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <!-- Важно для мобильных: предотвращает зум и адаптирует масштаб -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOBILE TERMINAL</title>
    
    <script type="text/javascript" src="//code.jquery.com/jquery-latest.min.js"></script>
    <script type="text/javascript" src="//hst-api.wialon.com/wsdk/script/wialon.js"></script>
    
    <style>
        :root {
            --neon: #00ff41;
            --bg: #0a0a0b;
        }

        body {
            background-color: var(--bg);
            color: var(--neon);
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom);
            height: 100vh;
            box-sizing: border-box;
        }

        /* Контейнер камеры оптимизирован под экран смартфона */
        #video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1; /* Квадратная область сканирования */
            max-width: 350px;
            border: 2px solid var(--neon);
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.15);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: var(--neon);
            box-shadow: 0 0 15px var(--neon);
            animation: move-line 2.5s infinite linear;
            z-index: 5;
        }

        @keyframes move-line { 0% { top: 0%; } 100% { top: 100%; } }

        /* Удобная мобильная группа ввода */
        .input-container {
            width: 100%;
            max-width: 350px;
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        #user-input {
            flex: 1;
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 15px; /* Больше отступ для пальцев */
            border-radius: 12px;
            font-size: 16px; /* Предотвращает авто-зум в iOS */
            outline: none;
        }

        #mic-btn {
            width: 54px;
            height: 54px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid var(--neon);
            border-radius: 12px;
            color: var(--neon);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        #mic-btn.listening {
            background: #ff4141;
            border-color: #ff4141;
            color: white;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* Инфо-панель */
        #status-panel {
            width: 100%;
            max-width: 350px;
            background: rgba(0, 255, 65, 0.02);
            border: 1px dashed rgba(0, 255, 65, 0.3);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }

        #cam-qr-result {
            font-size: 14px;
            word-break: break-all;
            opacity: 0.8;
        }

        .label { font-size: 10px; margin-bottom: 5px; color: #555; }
    </style>
</head>
<body>

    <div id="video-wrapper">
        <div class="scan-line"></div>
        <video id="qr-video"></video>
    </div>


    <div id="status-panel">
      <div class="label">LAST_QR_READ:</div>
      <div id="cam-qr-result">NOT_DETECTED</div>
  </div>

    <div class="input-container">
      <input type="text" id="user-input" list="data-presets" placeholder="назва...">
      <datalist id="data-presets"></datalist>
        <button id="mic-btn">
            <svg width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                <path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0V3z"/>
                <path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z"/>
            </svg>
        </button>
    </div>

  


    <script src="html2canvas.js"></script>
    <script src="qr-scanner.umd.min.js"></script>
    <script src="sliv.js"></script>
</body>
</html>
